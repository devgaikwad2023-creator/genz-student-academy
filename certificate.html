<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Certificate | Genz Academy</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
</head>
<body style="background: #0f172a; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px;">

    <div id="certificate-area" style="width: 800px; background: white; border: 15px solid #1e293b; padding: 30px; text-align: center; color: #1e293b; font-family: 'Poppins', sans-serif; box-shadow: 0 0 20px rgba(0,0,0,0.5);">
        <div style="border: 5px solid #38bdf8; padding: 40px; position: relative;">
            <h1 style="font-size: 50px; margin: 0; color: #1e293b;">CERTIFICATE</h1>
            <p style="font-size: 18px; letter-spacing: 5px; color: #64748b; font-weight: bold;">OF COMPLETION</p>
            
            <div style="margin: 40px 0;">
                <p style="font-size: 20px;">This is proudly presented to</p>
                <h2 id="cert-name" style="font-size: 45px; color: #38bdf8; text-decoration: underline; margin: 15px 0;">Loading Name...</h2>
                <p style="font-size: 18px;">for successfully completing the premium course</p>
                <h3 style="font-size: 28px; margin-top: 10px;">Full Stack Web Development</h3>
            </div>

            <div style="display: flex; justify-content: space-between; margin-top: 60px; padding: 0 40px;">
                <div style="text-align: center;">
                    <p style="font-weight: bold; border-top: 2px solid #1e293b; width: 150px; padding-top: 5px;">Date</p>
                </div>
                <div style="text-align: center;">
                    <p style="font-weight: bold; border-top: 2px solid #1e293b; width: 150px; padding-top: 5px;">Instructor</p>
                </div>
            </div>
        </div>
    </div>

    <div style="margin-top: 30px;">
        <button onclick="downloadCert()" style="padding: 15px 35px; background: #38bdf8; color: black; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s;">
            📥 Download as PDF
        </button>
        <button onclick="location.href='index.html'" style="padding: 15px 35px; background: transparent; color: white; border: 2px solid white; border-radius: 10px; font-weight: bold; cursor: pointer; margin-left: 10px;">
            Go to Home
        </button>
    </div>

    <script type="module">
        import { auth } from "./firebase.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Naam load karne ka logic
        onAuthStateChanged(auth, (user) => {
            const nameElement = document.getElementById('cert-name');
            if (user && user.displayName) {
                nameElement.innerText = user.displayName;
            } else {
                // Backup: Agar Firebase mein naam nahi hai toh pooch lo
                let manualName = prompt("Firebase naam nahi mila. Certificate ke liye apna naam batayein:");
                nameElement.innerText = manualName || "Genz Graduate";
            }
        });

        // Download logic
        window.downloadCert = function() {
            const element = document.getElementById('certificate-area');
            const options = {
                margin: 0,
                filename: 'My_Genz_Certificate.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'in', format: 'letter', orientation: 'landscape' }
            };
            
            // Start download
            html2pdf().set(options).from(element).save()
            .then(() => {
                alert("Certificate downloaded successfully!");
            })
            .catch(err => {
                console.error("PDF Error:", err);
                alert("Download mein thodi problem aayi. Please ek baar refresh karke try karein.");
            });
        };
    </script>
</body>
</html>
