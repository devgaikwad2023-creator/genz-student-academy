<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Dashboard | Genz Student Academy</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <!-- NAVBAR -->

  <nav class="navbar">

    <div class="logo">
      Genz Student Academy
    </div>

    <ul class="nav-links">

      <li><a href="index.html">Home</a></li>

      <li><a href="courses.html">Courses</a></li>

      <li><a href="dashboard.html">Dashboard</a></li>

      <li><a href="contact.html">Contact</a></li>

    </ul>

  </nav>

  <!-- DASHBOARD -->

  <section class="dashboard">

    <h1>
      Welcome Back 👋
    </h1>

    <p>
      Continue your learning journey.
    </p>

    <div class="dashboard-grid">

      <div class="dashboard-card">

        <h2>
          Enrolled Courses
        </h2>

        <span>
          3
        </span>

      </div>

      <div class="dashboard-card">

        <h2>
          Completed Lessons
        </h2>

        <span>
          18
        </span>

      </div>

      <div class="dashboard-card">

        <h2>
          Learning Progress
        </h2>

        <span>
          45%
        </span>

      </div>

    </div>

    <div class="purchased-courses">
    <h2>My Courses</h2>
    <div id="course-list" class="course-grid">
        <div class="course-card-mini">
            <img src="https://via.placeholder.com/150" alt="Course Thumbnail">
            <h3>Web Development Masterclass</h3>
            <div class="progress-bar"><div class="progress" style="width: 45%;"></div></div>
            <button class="continue-btn" onclick="window.location.href='course-player.html'">Continue Learning</button>
        </div>
    </div>
</div>
    
  </section>

<script type="module" src="firebase.js"></script>

</body>

</html>
