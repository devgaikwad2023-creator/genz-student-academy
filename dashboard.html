<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | Genz Student Academy</title>
  <link rel="icon" type="image/png" href="Genz Student Academy logo.png">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
</head>

<body>

  <nav class="navbar">
    <div class="logo">
      Genz Student Academy
    </div>

    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="courses.html">Courses</a></li>
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="profile.html" style="color: #38bdf8; font-weight: bold;"><i class="fa fa-user"></i> My Profile</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <section class="dashboard">

    <h1>
      Welcome Back 👋
    </h1>

    <p>
      Continue your learning journey.
    </p>

    <div class="dashboard-grid">

      <div class="dashboard-card">
        <h2>Enrolled Courses</h2>
        <span>3</span>
      </div>

      <div class="dashboard-card">
        <h2>Completed Lessons</h2>
        <span>18</span>
      </div>

      <div class="dashboard-card">
        <h2>Learning Progress</h2>
        <span>45%</span>
      </div>

    </div>

    <div class="purchased-courses">
      <h2>My Courses</h2>
      <div id="course-list" class="course-grid">
        <div class="course-card-mini">
          <img src="https://via.placeholder.com/150" alt="Course Thumbnail">
          <h3>Web Development Masterclass</h3>
          <div class="progress-bar">
            <div class="progress" style="width: 45%;"></div>
          </div>
          <button class="continue-btn" onclick="window.location.href='course-player.html'">Continue Learning</button>
        </div>
      </div>
    </div>

  </section>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // 1. Progress aur User Data Load karna
    auth.onAuthStateChanged(async (user) => {
        if (user) {
            document.querySelector('.dashboard h1').innerText = `Welcome Back, ${user.displayName || "Student"} 👋`;

            const docRef = doc(db, "enrollments", user.uid);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                const data = docSnap.data();
                const progress = data.completedPercent || 0;

                // UI Cards update karna
                document.querySelectorAll('.dashboard-card span')[2].innerText = `${progress}%`;
                const bar = document.querySelector('.course-card-mini .progress');
                if(bar) bar.style.width = `${progress}%`;
            }
        } else {
            window.location.href = "login.html";
        }
    });

    // 2. Chat Logic (Jo gayab ho gaya tha)
    const responses = {
        "hello": "Hello! Aaj hum kya seekhenge?",
        "hi": "Hi there! Main aapki kaise help kar sakta hoon?",
        "hlo": "Hello! Padhai kaisi chal rahi hai?",
        "good morning": "Very Good Morning! Chalo kuch naya seekhte hain.",
        "yes": "Great! Bataiye kya help chahiye?",
        "notes": "Notes ke liye 'Course Player' mein 'Download Notes' button check karein.",
        "default": "Great question! Iske baare mein aap mujhse kuch bhi pooch sakte hain."
    };

    window.toggleChat = function() {
        const chat = document.getElementById('ai-chat-container');
        chat.classList.toggle('chat-closed');
        chat.classList.toggle('chat-open'); // CSS mein display toggle check kar lena
    };

    window.sendMessage = function() {
        const input = document.getElementById('user-input');
        const box = document.getElementById('chat-box');
        const text = input.value.trim().toLowerCase();

        if (!text) return;

        // User Message
        box.innerHTML += `<p class="user-msg" style="background: #0ea5e9; padding: 8px; border-radius: 5px; margin: 5px 0; text-align: right;">${input.value}</p>`;
        
        // Bot Reply
        setTimeout(() => {
            const reply = responses[text] || responses["default"];
            box.innerHTML += `<p class="bot-msg" style="background: #334155; padding: 8px; border-radius: 5px; margin: 5px 0;"><b>Bot:</b> ${reply}</p>`;
            box.scrollTop = box.scrollHeight;
        }, 400);

        input.value = '';
        box.scrollTop = box.scrollHeight;
    };

    <div id="ai-chat-container" class="chat-closed" style="display:none;">
    <!-- (Chat box ka pura HTML jo index.html mein hai) -->
</div>
<div id="chat-icon" onclick="toggleChat()">
    <img src="https://cdn-icons-png.flaticon.com/512/4712/4712035.png" alt="AI Chat">
</div>
      
<script type="module" src="script.js"></script>
<script src="chat.js"></script>  
</body>
</html>
