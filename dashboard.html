<!DOCTYPE html>
<html>
<head>
  <title>Student Dashboard - Genz Student Academy</title>

  <div class="search-bar">
    <input type="text" placeholder="Search courses, videos...">
  </div>
</div>
  
  <style>
    body { font-family: Arial; margin:0; background:#f5f5f5; }
    .header { background:#111; color:white; padding:15px; text-align:center; }
    .container { padding:20px; }
    .card {
      background:white;
      padding:15px;
      margin:10px 0;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }
    .btn {
      display:inline-block;
      padding:10px 15px;
      background:#007bff;
      color:white;
      text-decoration:none;
      border-radius:5px;
    }
  </style>
</head>

<body>

<div class="header">
  <h2>Welcome to Your Dashboard</h2>
</div>

<div class="container">

  <div class="card">
    <h3>Your Progress</h3>
    <p>Completed Courses: 2</p>
    <p>Ongoing Courses: 1</p>
  </div>

  <div class="card">
    <h3>Continue Learning</h3>
    <a class="btn" href="course.html">Go to Course</a>
  </div>

  <div class="card">
    <h3>Watch Videos</h3>
    <a class="btn" href="video.html">Open Videos</a>
  </div>

</div>

</body>
</html>
