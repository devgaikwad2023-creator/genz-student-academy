<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | Genz Student Academy</title>
  <link rel="icon" type="image/png" href="Genz Student Academy logo.png">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
</head>

<body>

  <nav class="navbar">
    
    <a href="index.html" class="logo">
    <div class="menu-toggle" id="mobile-menu">☰</div>
    <img src="Genz Student Academy logo.png" alt="GenZ Academy Logo" class="nav-logo">
</a>
    
    <div class="logo">
      Genz Student Academy
    </div>

    <ul class="nav-links" id="nav-list">
      <li><a href="index.html">Home</a></li>
      <li><a href="courses.html">Courses</a></li>
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="profile.html" style="color: #38bdf8; font-weight: bold;"><i class="fa fa-user"></i> My Profile</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <section class="dashboard">

    <h1>
      Welcome Back 👋
    </h1>

    <p>
      Continue your learning journey.
    </p>

    <div class="dashboard-grid">

      <div class="dashboard-card">
        <h2>Enrolled Courses</h2>
        <span>0</span>
      </div>

      <div class="dashboard-card">
        <h2>Completed Lessons</h2>
        <span>0</span>
      </div>

      <div class="dashboard-card">
        <h2>Learning Progress</h2>
        <span>0%</span>
      </div>

    </div>

    <div class="purchased-courses" id="purchased-courses-section">
      <h2>My Courses</h2>
      <div id="course-list" class="course-grid">
        </div>
    </div>

  </section>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    auth.onAuthStateChanged(async (user) => {
        if (user) {
            document.querySelector('.dashboard h1').innerText = `Welcome Back, ${user.displayName || "Student"} 👋`;

            // STEP 1: Pehle check karo ki user ne sach mein fees bhari hai ya nahi (enrollments check)
            const enrollmentRef = doc(db, "enrollments", user.uid);
            const enrollmentSnap = await getDoc(enrollmentRef);

            const courseSection = document.getElementById('purchased-courses-section');
            const courseList = document.getElementById('course-list');

            if (enrollmentSnap.exists()) {
                // USER IS PAID/ENROLLED! Ab iska dynamic progress nikalenge userProgress se
                const progressRef = doc(db, "userProgress", user.uid);
                const progressSnap = await getDoc(progressRef);

                let maxLectureVisited = 0;
                let isAssignmentSubmitted = false;

                if (progressSnap.exists()) {
                    const progressData = progressSnap.data();
                    maxLectureVisited = progressData.maxLectureVisited || 0;
                    isAssignmentSubmitted = progressData.assignmentSubmitted || false;
                }

                // Dynamic formula execution
                let videoProgress = maxLectureVisited * 20; 
                let finalProgress = videoProgress + (isAssignmentSubmitted ? 20 : 0);
                if(finalProgress > 100) finalProgress = 100;

                // Update Top Stats Cards for Paid User
                document.querySelectorAll('.dashboard-card span')[0].innerText = "1"; 
                document.querySelectorAll('.dashboard-card span')[1].innerText = maxLectureVisited; 
                document.querySelectorAll('.dashboard-card span')[2].innerText = `${finalProgress}%`; 

                // Injecting the Course Card safely into UI
                courseSection.style.display = "block";
                courseList.innerHTML = `
                    <div class="course-card-mini">
                      <img src="https://via.placeholder.com/150" alt="Course Thumbnail">
                      <h3>Resume Mastery: The ATS - Friendly Formula</h3>
                      <div class="progress-bar">
                        <div class="progress" style="width: ${finalProgress}%;"></div>
                      </div>
                      <button class="continue-btn" onclick="window.location.href='course-player.html'">Continue Learning</button>
                    </div>
                `;

            } else {
                // USER HAS NOT PAID / UNENROLLED FREE USER!
                // Reset all stat numbers to pure ZERO
                document.querySelectorAll('.dashboard-card span')[0].innerText = "0"; 
                document.querySelectorAll('.dashboard-card span')[1].innerText = "0"; 
                document.querySelectorAll('.dashboard-card span')[2].innerText = "0%"; 

                // Injecting restricted message & hiding main course card block
                courseList.innerHTML = `
                    <p style="color: #94a3b8; font-size: 1.1rem; grid-column: 1/-1; background: #1e293b; padding: 20px; border-radius: 8px; border: 1px dashed #475569;">
                        ⚠️ You haven't enrolled in any courses yet. Please visit the <a href="courses.html" style="color: #0ea5e9; font-weight: bold; text-decoration: none;">Courses</a> section to purchase and start your learning journey!
                    </p>
                `;
            }

        } else {
            window.location.href = "login.html";
        }
    });
  </script>

  <div id="ai-chat-container" class="chat-closed">
    <div class="chat-header" onclick="toggleChat()">
        <span>🤖 Genz AI Assistant</span>
        <button id="close-chat" onclick="toggleChat(); event.stopPropagation();">×</button>
    </div>
    <div id="chat-box" class="chat-body">
        <p class="bot-msg">Hey! I am your Study Assistant. How can I help you today?</p>
    </div>
    <div class="chat-footer">
        <input type="text" id="user-input" placeholder="Ask anything...">
        <button onclick="sendMessage()"><i class="fa fa-paper-plane"></i></button>
    </div>
  </div>

  <div id="chat-icon" onclick="toggleChat()">
      <img src="https://cdn-icons-png.flaticon.com/512/4712/4712035.png" alt="AI Chat">
  </div>
  
  <script type="module" src="script.js"></script>
  <script src="chat.js"></script>

  <script>
    const menuToggle = document.getElementById('mobile-menu');
    const navList = document.getElementById('nav-list');

    if(menuToggle) {
        menuToggle.addEventListener('click', () => {
            navList.classList.toggle('active');
        });
    }
  </script>
</body>
</html>
