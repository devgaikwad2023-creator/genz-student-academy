<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Signup | Genz Student Academy</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <!-- NAVBAR -->

  <nav class="navbar">

    <div class="logo">
      Genz Student Academy
    </div>

  </nav>

  <!-- SIGNUP -->

  <section class="login-section">

    <div class="login-box">

      <h1>
        Create Account 🚀
      </h1>

      <form onsubmit="handleSignup(event)">

        <input
          type="email"
          id="signup-email"
          placeholder="Email Address"
          required
        >

        <input
          type="password"
          id="signup-password"
          placeholder="Password"
          required
        >

        <button type="submit" class="nav-btn">
          Create Account
        </button>

      </form>
      <p class="switch-auth">
  Already have an account?
  <a href="login.html">Login</a>
</p>
    </div>

  </section>

<script type="module" src="firebase.js"></script>

  <div id="ai-chat-container" class="chat-closed">
    <div class="chat-header" onclick="toggleChat()">
        <span>🤖 Genz AI Assistant</span>
        <button id="close-chat">×</button>
    </div>
    <div id="chat-box" class="chat-body">
        <p class="bot-msg">Hey! I am your Study Assistant. How can I help you today?</p>
    </div>
    <div class="chat-footer">
        <input type="text" id="user-input" placeholder="Ask anything...">
        <button onclick="sendMessage()"><i class="fa fa-paper-plane"></i></button>
    </div>
</div>

<div id="chat-icon" onclick="toggleChat()">
    <img src="https://cdn-icons-png.flaticon.com/512/4712/4712035.png" alt="AI Chat">
</div>

  <div id="ai-chat-container" class="chat-closed" style="display:none;">
    <!-- (Chat box ka pura HTML jo index.html mein hai) -->
</div>
<div id="chat-icon" onclick="toggleChat()">
    <img src="https://cdn-icons-png.flaticon.com/512/4712/4712035.png" alt="AI Chat">
</div>
  
  <script type="module" src="script.js"></script>
  <script src="chat.js"></script>
</body>

</html>
