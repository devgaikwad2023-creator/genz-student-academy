<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Signup | Genz Student Academy</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <!-- NAVBAR -->

  <nav class="navbar">

    <div class="logo">
      Genz Student Academy
    </div>

  </nav>

  <!-- SIGNUP -->

  <section class="login-section">

    <div class="login-box">

      <h1>
        Create Account 🚀
      </h1>

      <form id="signup-form">

        <input
          type="email"
          id="signup-email"
          placeholder="Email Address"
          required
        >

        <input
          type="password"
          id="signup-password"
          placeholder="Password"
          required
        >

        <button type="submit" class="nav-btn">
          Create Account
        </button>

      </form>
      <p class="switch-auth">
  Already have an account?
  <a href="login.html">Login</a>
</p>
    </div>

  </section>

<script type="module" src="firebase.js"></script>

</body>

</html>
