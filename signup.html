<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup | Genz Student Academy</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Sirf Signup Form ko Login Jaisa Banane ke liye Extra Styling */
        .login-section {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 80px);
            background: #0f172a; /* Same as your theme */
            padding: 20px;
        }

        .login-box {
            background: #1e293b; /* Card Background */
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid #334155;
        }

        .login-box h1 {
            font-size: 28px;
            margin-bottom: 10px;
            color: white;
        }

        .login-box p {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 30px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input {
            background: #0f172a;
            border: 1px solid #334155;
            padding: 15px;
            border-radius: 10px;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.2);
        }

        .nav-btn {
            background: #0ea5e9;
            color: white;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .nav-btn:hover {
            background: #0284c7;
            transform: translateY(-2px);
        }

        .switch-auth {
            margin-top: 20px !important;
            font-size: 14px;
        }

        .switch-auth a {
            color: #38bdf8;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="logo">
            Genz Student Academy
        </div>
    </nav>

    <!-- SIGNUP SECTION -->
    <section class="login-section">
        <div class="login-box">
            <h1>Create Account 🚀</h1>
            <p>Enter your details to start learning.</p>

            <form onsubmit="handleSignup(event)">
                <input type="email" id="signup-email" placeholder="Email Address" required>
                <input type="password" id="signup-password" placeholder="Password" required>
                <button type="submit" class="nav-btn">Create Account</button>
            </form>

            <p class="switch-auth">
                Already have an account? <a href="login.html">Login</a>
            </p>
        </div>
    </section>

    <!-- FIREBASE & SCRIPTS (Baki sab as it is rakha hai) -->
    <script type="module" src="firebase.js"></script>

    <div id="ai-chat-container" class="chat-closed">
        <div class="chat-header" onclick="toggleChat()">
            <span>🤖 Genz AI Assistant</span>
            <button id="close-chat">×</button>
        </div>
        <div id="chat-box" class="chat-body">
            <p class="bot-msg">Hey! I am your Study Assistant. How can I help you today?</p>
        </div>
        <div class="chat-footer">
            <input type="text" id="user-input" placeholder="Ask anything...">
            <button onclick="sendMessage()"><i class="fa fa-paper-plane"></i></button>
        </div>
    </div>

    <div id="chat-icon" onclick="toggleChat()">
        <img src="https://cdn-icons-png.flaticon.com/512/4712/4712035.png" alt="AI Chat">
    </div>

    <script type="module" src="script.js"></script>
    <script src="chat.js"></script>
</body>

</html>
