<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Player | GenZ Student Academy</title>
    <link rel="stylesheet" href="style.css">
</head>

<body id="player-body" style="background: #0f172a; color: white; display: none;">

    <div class="player-container">
        <aside class="lesson-sidebar">
            <h3>Course Content</h3>
            
            <div style="padding: 10px; background: rgba(0,0,0,0.2); border-radius: 10px; margin-bottom: 20px;">
    <small>Course Progress: 25%</small>
    <div class="progress-bar"><div class="progress" style="width: 25%;"></div></div>
</div>
            
            <ul id="lesson-list">
    <li class="active" onclick="changeVideo('https://www.youtube.com/embed/dQw4w9WgXcQ', '1. Introduction to Web Dev')">1. Introduction to Web Dev</li>
    <li onclick="changeVideo('https://www.youtube.com/embed/L72fhGm1Lrc', '2. HTML Basics')">2. HTML Basics</li>
    <li onclick="changeVideo('https://www.youtube.com/embed/1Rs2ND1RYYc', '3. Styling with CSS')">3. Styling with CSS</li>
    <li onclick="changeVideo('https://www.youtube.com/embed/W6NZfCO5SIk', '4. JavaScript Logic')">4. JavaScript Logic</li>
</ul>
        </aside>

        <main class="video-section">
            <div class="video-box">
                <iframe width="100%" height="500" 
                    src="https://www.youtube.com/embed/fDbaHn46t0o" 
                    frameborder="0" allowfullscreen>
                </iframe>
            </div>
            
            <div class="video-details">
                <h1>Lecture 1: Introduction to GenZ Design</h1>
                <p style="color: #94a3b8; margin-top: 10px;">
                    Is lecture mein hum seekhenge ki aesthetic layouts kaise banate hain.
                </p>
                
                <div style="display: flex; gap: 15px; margin-top: 20px;">
                    <button class="download-btn">Download Notes</button>
                    <button class="download-btn" style="background: #3b82f6;">Download Certificate</button>
                    <button class="download-btn" style="background: #64748b;">Save as PDF</button>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { auth, db } from "./firebase.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        onAuthStateChanged(auth, async (user) => {
            const body = document.getElementById('player-body');
            
            if (!user) {
                alert("Security Alert: Please login to access this course.");
                window.location.href = "login.html";
                return;
            }

            try {
                // Enrollment status check directly from your Firestore
                const userDoc = await getDoc(doc(db, "enrollments", user.uid));

                if (userDoc.exists() && userDoc.data().status === "active") {
                    // Access Granted: Style apply ho jayegi
                    body.style.display = "block";
                } else {
                    alert("Arey bro! You need to enroll in this course first.");
                    window.location.href = "courses.html";
                }
            } catch (error) {
                console.error("Connection Error:", error);
                window.location.href = "courses.html";
            }
        });
    </script>

    <script>
    function changeVideo(videoUrl, title) {
        // Change Video Source
        document.getElementById('main-video').src = videoUrl;
        
        // Change Title
        document.getElementById('video-title').innerText = title;

        // Change Active Class in Sidebar
        let listItems = document.querySelectorAll('#lesson-list li');
        listItems.forEach(item => item.classList.remove('active'));
        event.currentTarget.classList.add('active');
    };
</script>
    
</body>
</html>
