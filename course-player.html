<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Player | GenZ Academy</title>
</head>

<body id="player-body" style="background: #0f172a; color: white; display: none;">

    <div id="course-content">
        <h1>Welcome to Your Course 🚀</h1>
        <p>Video loading...</p>
    </div>

    <script type="module">
        import { auth, db } from "./firebase.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        onAuthStateChanged(auth, async (user) => {
            // Humne 'body' ko yahan andar define kiya hai taaki error na aaye
            const body = document.getElementById('player-body');
            
            if (!user) {
                console.log("No user found, redirecting to login...");
                alert("Security Alert: Please login to access this course.");
                window.location.href = "login.html";
                return;
            }

            console.log("User Logged In. UID:", user.uid);

            try {
                // Database check chalu
                const userDocRef = doc(db, "enrollments", user.uid);
                const userDoc = await getDoc(userDocRef);

                if (userDoc.exists() && userDoc.data().status === "active") {
                    // SUCCESS: Access mil gaya!
                    console.log("Access Granted! Status is active.");
                    body.style.display = "block";
                } else {
                    // FAIL: Database mein entry nahi mili ya status active nahi hai
                    console.log("Access Denied: Enrollment not found.");
                    alert("Arey bro! You need to enroll in this course first.");
                    window.location.href = "courses.html";
                }
            } catch (error) {
                console.error("Firestore connectivity error:", error);
                alert("Database connection error. Try again.");
                window.location.href = "courses.html";
            }
        });
    </script>
</body>
</html>
