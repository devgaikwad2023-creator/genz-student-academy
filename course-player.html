<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Course Player | GenZ Academy</title>
    <link rel="stylesheet" href="course-player.css"> 
</head>

<body id="player-body" style="display: none;">

    <div class="main-container">
        <aside class="sidebar">
            <h3>Course Content</h3>
            <div class="completion-bar">
                <p>Completion: <span id="percent">0%</span></p>
                <div class="progress-bg"><div class="progress-fill" style="width: 0%;"></div></div>
            </div>
            <ul class="lecture-list">
                <li class="active">Lecture 1: Introduction</li>
                <li>Lecture 2: Getting Started</li>
                <li>Lecture 3: Advanced Concepts</li>
            </ul>
        </aside>

        <main class="content">
            <div class="video-section">
                 <iframe src="https://www.youtube.com/embed/YOUR_VIDEO_ID" frameborder="0" allowfullscreen></iframe>
            </div>
            
            <div class="actions">
                <button>Download Notes</button>
                <button id="cert-btn" disabled>Download Certificate</button>
                <button>Save as PDF</button>
            </div>
        </main>
    </div>

    <script type="module">
        import { auth, db } from "./firebase.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        onAuthStateChanged(auth, async (user) => {
            const body = document.getElementById('player-body');

            if (!user) {
                alert("Security Alert: Login required!");
                window.location.href = "login.html";
                return;
            }

            try {
                // Enrollment Check
                const userDoc = await getDoc(doc(db, "enrollments", user.uid));

                if (userDoc.exists() && userDoc.data().status === "active") {
                    // SUCCESS: Ab professional design dikhao
                    body.style.display = "block";
                    console.log("Professional Access Granted!");
                } else {
                    alert("Arey bro! You need to enroll to see this professional dashboard.");
                    window.location.href = "courses.html";
                }
            } catch (error) {
                console.error("Error:", error);
                window.location.href = "courses.html";
            }
        });
    </script>
</body>
</html>
