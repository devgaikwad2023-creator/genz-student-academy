<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | GenZ Academy</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
</head>
<body style="background: #0f172a; color: white;">

    <div class="profile-container">
        <div class="profile-card">
            <div class="profile-header">
                <img id="user-img" src="https://via.placeholder.com/100" alt="Profile Picture">
                <h2 id="user-display-name">Fetching Name...</h2>
                <p id="user-display-email">Fetching Email...</p>
            </div>
            
            <div class="profile-stats">
                <div class="stat-box">
                    <h3>3</h3>
                    <p>Courses</p>
                </div>
                <div class="stat-box">
                    <h3>45%</h3>
                    <p>Progress</p>
                </div>
            </div>

            <button class="edit-btn" onclick="alert('Profile Edit feature is coming soon!')"><i class="fa fa-edit"></i> Edit Profile</button>
            <button id="logout-btn" class="logout-btn">Logout</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // IMPORTANT: Paste your Firebase Config here from your firebase.js file
        const firebaseConfig = {

  apiKey: "AIzaSyCeUJEVaKFNIgyroHAy_MFbx5Yv9POmUcQ",

  authDomain: "genz-student-academy.firebaseapp.com",

  projectId: "genz-student-academy",

  storageBucket: "genz-student-academy.firebasestorage.app",

  messagingSenderId: "358103651695",

  appId: "1:358103651695:web:b087ba14d01a6ba751049a",

  measurementId: "G-XJH4TKVQZW"

};

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const nameTag = document.getElementById('user-display-name');
        const emailTag = document.getElementById('user-display-email');
        const userImg = document.getElementById('user-img');
        const logoutBtn = document.getElementById('logout-btn');

        // Check user status
        onAuthStateChanged(auth, (user) => {
            if (user) {
                nameTag.innerText = user.displayName || "Genz Student";
                emailTag.innerText = user.email;
                if(user.photoURL) {
                    userImg.src = user.photoURL;
                }
            } else {
                window.location.href = "login.html";
            }
        });

        // Logout
        logoutBtn.addEventListener('click', () => {
            signOut(auth).then(() => {
                window.location.href = "login.html";
            });
        });
    </script>
</body>
</html>
