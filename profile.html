<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | GenZ Academy</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
</head>
<body style="background: #0f172a; color: white;">

    <div class="profile-container">
        <div class="profile-card">
            <div class="profile-header">
                <img id="user-img" src="https://via.placeholder.com/100" alt="Profile Picture">
                <h2 id="user-display-name">Loading Name...</h2>
                <p id="user-display-email">Loading Email...</p>
            </div>
            
            <div class="profile-stats">
                <div class="stat-box">
                    <h3>3</h3>
                    <p>Courses</p>
                </div>
                <div class="stat-box">
                    <h3>45%</h3>
                    <p>Progress</p>
                </div>
            </div>

            <button class="edit-btn"><i class="fa fa-edit"></i> Edit Profile</button>
            <button id="logout-btn" class="logout-btn">Logout</button>
        </div>
    </div>

    <script type="module">
        import { auth } from "./firebase.js";
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Check if user is logged in and show data
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('user-display-name').innerText = user.displayName || "Genz Student";
                document.getElementById('user-display-email').innerText = user.email;
                if(user.photoURL) {
                    document.getElementById('user-img').src = user.photoURL;
                }
            } else {
                // If not logged in, send to login page
                window.location.href = "login.html";
            }
        });

        // Logout Function
        document.getElementById('logout-btn').addEventListener('click', () => {
            signOut(auth).then(() => {
                alert("Logged out successfully!");
                window.location.href = "login.html";
            });
        });
    </script>
</body>
</html>
